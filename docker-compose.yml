services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-document_intelligence}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-document_intelligence}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: ${LOCALSTACK_SERVICES:-s3}
      DEBUG: ${LOCALSTACK_DEBUG:-0}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    ports:
      - "${LOCALSTACK_PORT:-4566}:4566"
      - "${LOCALSTACK_EDGE_PORT_RANGE:-4510-4559}:4510-4559"
    volumes:
      - ${LOCALSTACK_VOLUME_DIR:-./localstack-volume}:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://localhost:4566/_localstack/health >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  langflow:
    image: langflowai/langflow:1.3.4
    ports:
      - "${LANGFLOW_PORT:-7860}:7860"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Automatically registers OPENAI_API_KEY as a LangFlow Global Variable.
      # The flow's api_key field with load_from_db=true then resolves it from
      # LangFlow's database — the key is never stored in the flow JSON.
      LANGFLOW_VARIABLES_TO_GET_FROM_ENVIRONMENT: OPENAI_API_KEY
    volumes:
      - langflow-data:/app/langflow
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:7860/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    build:
      context: .
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-document_intelligence}?schema=public
      REDIS_URL: redis://redis:6379
      EXTRACTION_ENGINE: ${EXTRACTION_ENGINE:-langflow}
      LANGFLOW_BASE_URL: http://langflow:7860/api/v1
      LANGFLOW_API_KEY: ${LANGFLOW_API_KEY:-}
      LANGFLOW_FLOW_ID: ${LANGFLOW_FLOW_ID:-}
      LANGFLOW_TIMEOUT_MS: ${LANGFLOW_TIMEOUT_MS:-30000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      S3_ENDPOINT: http://localstack:4566
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-test}
      S3_BUCKET: ${S3_BUCKET:-document-intelligence}
      S3_PREFIX: ${S3_PREFIX:-documents}
      S3_FORCE_PATH_STYLE: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-5242880}
      THROTTLE_TTL: ${THROTTLE_TTL:-60000}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-60}
      FAILED_JOB_RETRY_AFTER_MS: ${FAILED_JOB_RETRY_AFTER_MS:-300000}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      langflow:
        condition: service_healthy
    restart: on-failure

volumes:
  localstack-data:
  langflow-data:
